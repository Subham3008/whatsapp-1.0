services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - 9000:27017
    volumes:
      - whatsapp_db:/data/db

  backend:
    build: ./server
    container_name: backend
    ports:
      - 3001:3000
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - whatsapp_node_modules:/app/node_modules
    command: "npm run dev"

  frontend:
    build: ./client
    container_name: frontend
    ports:
      - 5173:5173
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - whatsapp_node_modules_frontend:/app/node_modules
    command: "npm run dev"

volumes:
  whatsapp_db:
  whatsapp_node_modules:
  whatsapp_node_modules_frontend:
